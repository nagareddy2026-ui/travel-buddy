<svg width="400" height="140" viewBox="0 0 400 140" fill="none" xmlns="http://www.w3.org/2000/svg">
<!-- Luggage Icon on the left -->
<g>
<!-- Luggage body -->
<rect x="20" y="35" width="50" height="70" rx="4" fill="none" stroke="#FF7C47" stroke-width="3"/>
<!-- Luggage handle -->
<path d="M32 35Q32 20 50 20Q68 20 68 35" fill="none" stroke="#FF7C47" stroke-width="3" stroke-linecap="round"/>
<!-- Luggage divider line -->
<line x1="28" y1="48" x2="62" y2="48" stroke="#FF7C47" stroke-width="2.5"/>
<!-- Luggage wheels -->
<circle cx="30" cy="110" r="4" fill="none" stroke="#FF7C47" stroke-width="2"/>
<circle cx="60" cy="110" r="4" fill="none" stroke="#FF7C47" stroke-width="2"/>
<!-- Wheel base line -->
<line x1="26" y1="110" x2="64" y2="110" stroke="#FF7C47" stroke-width="2"/>
</g>

<!-- Text: Travel on the right -->
<text x="95" y="60" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white">Travel</text>

<!-- Text: Together on the right -->
<text x="95" y="110" font-family="Arial, sans-serif" font-size="42" font-weight="bold" fill="white">Together</text>
</svg>
